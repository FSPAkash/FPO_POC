name: Render Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: render-keepalive
  cancel-in-progress: true

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend health endpoint
        env:
          HEALTH_URL: ${{ vars.RENDER_BACKEND_HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "Repository variable RENDER_BACKEND_HEALTH_URL is not set. Skipping keep-alive ping."
            exit 0
          fi

          echo "Pinging $HEALTH_URL"
          curl --fail --silent --show-error --max-time 30 --retry 2 --retry-delay 2 "$HEALTH_URL"
